---
controller_credential_types:
  - name: HCP Terraform API Secrets Test
    description: Custom credential type for HCP Terraform API authentication
    kind: cloud
    inputs:
      fields:
        - id: hcpterraform_api_token
          type: string
          label: HCP Terraform API Token
          secret: true
      required:
        - hcpterraform_api_token
    injectors:
      extra_vars:
        hcpterraform_api_token: !unsafe "{{ hcpterraform_api_token }}"

  - name: Datadog Secrets Test
    description: Custom credential type for Datadog API authentication
    kind: cloud
    inputs:
      fields:
        - id: datadog_api_key
          type: string
          label: Datadog API Key
          secret: true
      required:
        - datadog_api_key
    injectors:
      env:
        DATADOG_API_KEY: !unsafe "{{ datadog_api_key }}"

  - name: Snowagent Secrets Test
    description: Custom credential type for Snowagent Secrets authentication
    kind: cloud
    inputs:
      fields:
        - id: snowagent_acc_key
          type: string
          label: Snowagent Access Key
          secret: true
      required:
        - snowagent_acc_key
    injectors:
      extra_vars:
        snowagent_acc_key: !unsafe "{{ snowagent_acc_key }}"

  - name: Automox Secrets Test
    description: Custom credential type for Automox Secrets authentication
    kind: cloud
    inputs:
      fields:
        - id: automox_accesskey
          type: string
          label: Automox Access Key
          secret: true
      required:
        - automox_accesskey
    injectors:
      extra_vars:
        automox_accesskey: !unsafe "{{ automox_accesskey }}"

  - name: Crowdstrike Secrets Test
    description: Custom credential type for Crowdstrike Secrets authentication
    kind: cloud
    inputs:
      fields:
        - id: crowdstrike_cid
          type: string
          label: Crowdstrike CID
          secret: true
      required:
        - crowdstrike_cid
    injectors:
      extra_vars:
        crowdstrike_cid: !unsafe "{{ crowdstrike_cid }}"

  - name: Sumologic Secrets Test
    description: Custom credential type for Sumologic Secrets authentication
    kind: cloud
    inputs:
      fields:
        - id: sumologic_token
          type: string
          label: Sumo Logic Registration Token
          secret: true
        - id: sumologic_accessid
          type: string
          label: Sumo Logic Access ID
          secret: true
        - id: sumologic_accesskey
          type: string
          label: Sumo Logic Access Key
          secret: true
    injectors:
      extra_vars:
        sumologic_token: !unsafe '{{ sumologic_token }}'
        sumologic_accessid: !unsafe '{{ sumologic_accessid }}'
        sumologic_accesskey: !unsafe '{{ sumologic_accesskey }}'

  - name: Tenable Secrets Test
    description: Custom credential type for Tenable Secrets authentication
    kind: cloud
    inputs:
      fields:
        - id: tenable_key
          type: string
          label: Tenable Agent Key
          secret: true
      required:
        - tenable_key
    injectors:
      extra_vars:
        tenable_key: !unsafe "{{ tenable_key }}"

  - name: Windows Domain Join Test
    description: Credential type for Windows domain join 
    kind: cloud
    inputs:
      fields:
        - id: domain_join_user
          type: string
          label: Domain Join User
        - id: domain_join_password
          type: string
          label: Domain Join Password
          secret: true
        - id: hetwinadmin_password
          type: string
          label: hetwinadmin Password
          secret: true
      required:
        - domain_join_user
        - domain_join_password
        - hetwinadmin_password
    injectors:
      extra_vars:
        domain_join_user: !unsafe "{{ domain_join_user }}"
        domain_join_password: !unsafe "{{ domain_join_password }}"
        hetwinadmin_password: !unsafe "{{ hetwinadmin_password }}"