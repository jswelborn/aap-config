---
controller_inventories:
  - name: AWS
    organization: HTS SRE
    description: AWS dynamic inventory managed by code
    variables:
      managed_by: aap_cac

controller_inventory_sources:
  - name: hts-aws-com-std-app-ccoe-etg-prod
    organization: HTS SRE
    inventory: AWS
    source: ec2
    execution_environment: "Default execution environment"
    overwrite: true
    overwrite_vars: true
    update_on_launch: false
    verbosity: 1
    source_vars:
      <<: &aws_source_vars
        plugin: amazon.aws.aws_ec2
        strict_permissions: false
        strict: false
        regions:
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
          - ca-central-1
          - eu-central-1
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - eu-north-1
          - ap-northeast-1
          - ap-northeast-2
          - ap-northeast-3
          - ap-south-1
          - ap-southeast-1
          - ap-southeast-2
          - sa-east-1
        filters:
          instance-state-name: running
        hostnames:
          - tag:Name
          - private-dns-name
          - private-ip-address
        compose:
          ansible_host: private_ip_address | default(public_ip_address) | default(private_dns_name)
          private_ip: private_ip_address | default(None)
          public_ip: public_ip_address | default(None)
          instance_id: instance_id | default('')
          instance_type: instance_type | default('')
          image_id: image_id | default('')
          platform: platform | default('')
          platform_details: platform_details | default('')
          provisioning_state: state.name | default('')
          resource_type: '"aws_instance"'
          cloud_provider: '"aws"'
          os: platform_details | default('')
        keyed_groups:
          - prefix: tag
            key: tags
          - prefix: region
            key: placement.region
          - prefix: availability_zone
            key: placement.availability_zone
          - prefix: instance_type
            key: instance_type
      iam_role_arn: arn:aws:iam::027856332022:role/hts-ccoe-ansible-readonly
      groups:
        Windows: platform_details is match('Windows')
        Linux: platform_details is not match('Windows')
        AWS: true
        hts_aws_com_std_app_ccoe_etg_prod: true

