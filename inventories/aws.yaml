controller_groups:
  - name: AWS_Windows_Bootstrap_Config
    inventory: AWS
    variables:
      ansible_connection: winrm
      ansible_port: 5985
      ansible_winrm_transport: ntlm
      ansible_winrm_server_cert_validation: ignore
      ansible_shell_type: powershell
      domain_name: companynet.org
      domain_ou_path: OU=Terraform,OU=Servers,OU=Global,DC=CompanyNet,DC=org
      snowcmdb_user: COMPANYNET\snowcmdb
    children:
      - Windows

  - name: AWS_Windows_Post_Domain_Join_Config
    inventory: AWS
    variables:
      ansible_connection: winrm
      ansible_port: 5985
      ansible_host: "{{ inventory_hostname }}.CompanyNet.org"
      ansible_winrm_transport: kerberos
      ansible_winrm_server_cert_validation: ignore
      ansible_shell_type: powershell