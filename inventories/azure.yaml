---
controller_inventories:
  - name: Azure
    organization: HTS SRE
    description: Azure dynamic inventory managed by code
    variables:
      managed_by: aap_cac
  
controller_inventory_sources:
  - name: HBM_FDB_PROD
    organization: HTS SRE
    inventory: Azure
    source: azure_rm
    credential: "Azure Inventory - HBM_FDB_PROD"
    execution_environment: "Default execution environment"
    overwrite: true
    overwrite_vars: true
    update_on_launch: false
    verbosity: 1
    source_vars: 
      <<: &azure_source_vars
        plugin: azure_rm
        include_vm_resource_groups:
          - "*"
        auth_source: env
        plain_host_names: true
        hostnames:
          - name
        compose:
          ansible_host: >-
            private_ipv4_addresses[0] | default(public_ipv4_addresses[0] | default(name))
          private_ip: private_ipv4_addresses[0] | default(None)
          os_offer: image.offer | default('')
          os_sku: image.sku | default('')
          provisioning_state: provisioning_state | default('')
          resource_type: resource_type | default('')
        keyed_groups:
          - prefix: tag
            key: tags
          - prefix: location
            key: location
      aap_subscription_id: "03406327-efac-48f9-86da-67618104eec3"
      conditional_groups:
        Windows: image.offer | default('') is match('WindowsServer')
        Linux: image.offer | default('') is not match('WindowsServer')
        Azure: true
        HBM_FDB_PROD: true

