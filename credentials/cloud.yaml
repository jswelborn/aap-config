---
controller_credentials:
  - name: Azure Key Vault
    description: Azure Key Vault containing secrets required for AAP automation execution
    organization: HTS SRE
    credential_type: Microsoft Azure Key Vault
    inputs:
      url: "{{ azure_key_vault_url }}"
      client: "{{ azure_key_vault_client_id }}"
      secret: "{{ azure_key_vault_client_secret }}"
      tenant: "{{ azure_key_vault_tenant_id }}"
      cloud_name: AzureCloud

  - name: Azure Inventory
    description: Azure service principal used for dynamic inventory synchronization
    organization: HTS SRE
    credential_type: Microsoft Azure Resource Manager
    inputs:
      subscription: "{{ azure_inventory_subscription_id }}"
      client: "{{ azure_inventory_client_id }}"
      secret: "{{ azure_inventory_client_secret }}"
      tenant: "{{ azure_inventory_tenant_id }}"
      cloud_environment: AzureCloud

  - name: AWS Inventory
    description: AWS credential used for EC2 dynamic inventory synchronization
    organization: HTS SRE
    credential_type: Amazon Web Services
    inputs:
      username: "{{ aws_inventory_access_key }}"
      password: "{{ aws_inventory_secret_key }}"

  - name: AWS EC2 Metadata Lookup
    description: AWS credential used for EC2 metadata and instance information lookups
    organization: HTS SRE
    credential_type: Amazon Web Services
    inputs:
      username: "{{ aws_inventory_access_key }}"
      password: "{{ aws_inventory_secret_key }}"

  - name: Windows Automation
    description: Windows automation account used for Kerberos-based post-domain configuration
    organization: HTS SRE
    credential_type: Machine
    inputs:
      username: "{{ windows_automation_user }}"
      password: "{{ windows_automation_password }}"