---
controller_credentials:
  - name: Azure Key Vault CaC
    description: Azure Key Vault containing secrets required for AAP automation execution
    organization: Default
    credential_type: Microsoft Azure Key Vault
    inputs:
      url: "{{ azure_key_vault_url }}"
      client: "{{ azure_key_vault_client_id }}"
      secret: "{{ azure_key_vault_client_secret }}"
      tenant: "{{ azure_key_vault_tenant_id }}"
      cloud_name: AzureCloud

  - name: Azure Inventory-cac
    description: Azure service principal used for dynamic inventory synchronization
    organization: Default
    credential_type: Microsoft Azure Resource Manager
    inputs:
      subscription: "{{ azure_inventory_subscription_id }}"
      client: "{{ azure_inventory_client_id }}"
      secret: "{{ azure_inventory_client_secret }}"
      tenant: "{{ azure_inventory_tenant_id }}"
      cloud_environment: AzureCloud