---
controller_credentials:
  - name: AWS ec2-user SSH-cac
    description: SSH credential for AWS Linux EC2 instances
    organization: Default
    credential_type: Machine
    inputs:
      username: ec2-user
      ssh_key_data: "{{ aws_ec2_user_ssh_private_key }}"

  - name: hetroot-cac
    description: Linux privilege escalation and SSH credential for managed systems
    organization: HTS SRE
    credential_type: Machine
    inputs:
      username: hetroot
      ssh_key_data: "{{ hetroot_ssh_private_key }}"
      become_method: sudo
      become_username: root

  - name: hetwinadmin_default-cac
    description: Default Windows local administrator credential for managed systems
    organization: HTS SRE
    credential_type: Machine
    inputs:
      username: hetwinadmin
      password: "{{ hetwinadmin_default_password }}"

  - name: hetwinadmin_updated-cac
    description: Rotated hetwinadmin password stored in Azure Key Vault
    organization: HTS SRE
    credential_type: Machine
    inputs:
      username: hetwinadmin