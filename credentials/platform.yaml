---
controller_credentials:
  - name: AAP Controller Credential
    description: AAP controller credential used by automation to launch jobs and workflows
    organization: HTS SRE
    credential_type: Red Hat Ansible Automation Platform
    inputs:
      host: "{{ aap_hostname }}"
      username: "{{ aap_username }}"
      password: "{{ aap_password }}"
      verify_ssl: "{{ aap_validate_certs }}"

  - name: HCP Terraform API Token
    description: HCP Terraform API token used by post-apply orchestration workflows
    organization: HTS SRE
    credential_type: HCP Terraform API Secrets