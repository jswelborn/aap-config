---
eda_credentials:
  - name: terraform-cloud-hmac-cac
    description: HMAC credential used to validate Terraform Cloud webhook signatures
    organization: HTS SRE
    credential_type: HMAC Event Stream
    inputs:
      auth_type: hmac
      hash_algorithm: sha512
      signature_encoding: hex
      http_header_key: X-TFE-Notification-Signature
      secret: "{{ terraform_cloud_hmac_secret }}"

  - name: AAP Controller Credential CaC
    description: AAP controller credential used by EDA rulebook activations
    organization: HTS SRE
    credential_type: Red Hat Ansible Automation Platform
    inputs:
      host: "{{ aap_hostname }}/api/controller"
      username: "{{ aap_username }}"
      password: "{{ aap_password }}"
      verify_ssl: true
      request_timeout: "10"