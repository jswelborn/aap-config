---
- name: Configure AWS inventory in AAP
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../inventories/aws.yaml
    - ../group_vars/all.yaml

  environment:
    CONTROLLER_HOST: "{{ controller_hostname }}"
    CONTROLLER_OAUTH_TOKEN: "{{ controller_oauthtoken }}"
    CONTROLLER_VERIFY_SSL: "{{ controller_validate_certs | string }}"

  module_defaults:
    group/ansible.controller.controller:
      controller_host: "{{ controller_hostname }}"
      controller_oauthtoken: "{{ controller_oauthtoken }}"
      validate_certs: "{{ controller_validate_certs }}"

  roles:
    - infra.aap_configuration.controller_inventories
    - infra.aap_configuration.controller_inventory_sources
    - infra.aap_configuration.controller_inventory_source_update

  post_tasks:
    - name: Wait until Windows dynamic group exists
      ansible.controller.group:
        name: Windows
        inventory: AWS
        state: exists
      register: windows_group_check
      retries: 20
      delay: 5
      until: windows_group_check is succeeded

    - name: Configure AWS inventory groups
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_host_groups