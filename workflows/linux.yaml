---
controller_workflows:
  - name: Linux-bootstrap-azure
    organization: HTS SRE
    description: Bootstrap workflow for Linux systems in Azure
    inventory: Azure
    ask_inventory_on_launch: true
    ask_limit_on_launch: true
    ask_variables_on_launch: true
    destroy_current_nodes: true
    simplified_workflow_nodes:
      - identifier: linux-postbuild-azure
        unified_job_template: Linux-postbuild-azure
        always_nodes:
          - linux-identity-azure
      - identifier: linux-identity-azure
        unified_job_template: Linux-identity-azure
        success_nodes:
          - linux-sumologic-azure
          - linux-crowdstrike-azure
          - linux-snowagent-azure
          - linux-datadog-azure
          - linux-automox-azure
      - identifier: linux-sumologic-azure
