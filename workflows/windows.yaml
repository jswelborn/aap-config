---
controller_workflows:
  - name: Windows-bootstrap-azure-cac
    organization: Default
    description: Bootstrap workflow for Windows systems in Azure
    inventory: Azure-CaC-Test
    ask_limit_on_launch: true
    ask_variables_on_launch: true
    destroy_current_nodes: true
    simplified_workflow_nodes:
      - identifier: Windows-identity-azure
        unified_job_template: Windows-identity-azure-cac
        success_nodes:
          - Windows-crowdstrike-azure
      - identifier: Windows-crowdstrike-azure
        unified_job_template: Windows-crowdstrike-azure-cac
        always_nodes:
          - Windows-datadog-azure
      - identifier: Windows-datadog-azure
        unified_job_template: Windows-datadog-azure-cac
        always_nodes:
          - Windows-automox-azure
      - identifier: Windows-automox-azure
        unified_job_template: Windows-automox-production-azure-cac
        always_nodes:
          - Windows-tenable-azure
      - identifier: Windows-tenable-azure
        unified_job_template: Windows-tenable-azure-cac
        always_nodes:
          - Windows-snowagent-azure
      - identifier: Windows-snowagent-azure
        unified_job_template: Windows-snowagent-production-azure-cac
        always_nodes:
          - Windows-sumologic-azure
      - identifier: Windows-sumologic-azure
        unified_job_template: Windows-sumologic-production-azure-cac

  - name: Windows-bootstrap-aws-cac
    organization: Default
    description: Bootstrap workflow for Windows systems in AWS
    inventory: AWS-CaC-Test
    ask_limit_on_launch: true
    ask_variables_on_launch: true
    destroy_current_nodes: true
    simplified_workflow_nodes:
      - identifier: Windows-identity-aws
        unified_job_template: Windows-identity-aws-cac
        success_nodes:
          - Windows-crowdstrike-aws
      - identifier: Windows-crowdstrike-aws
        unified_job_template: Windows-crowdstrike-aws-cac
        always_nodes:
          - Windows-datadog-aws
      - identifier: Windows-datadog-aws
        unified_job_template: Windows-datadog-aws-cac
        always_nodes:
          - Windows-automox-aws
      - identifier: Windows-automox-aws
        unified_job_template: Windows-automox-production-aws-cac
        always_nodes:
          - Windows-tenable-aws
      - identifier: Windows-tenable-aws
        unified_job_template: Windows-tenable-aws-cac
        always_nodes:
          - Windows-snowagent-aws
      - identifier: Windows-snowagent-aws
        unified_job_template: Windows-snowagent-production-aws-cac
        always_nodes:
          - Windows-sumologic-aws
      - identifier: Windows-sumologic-aws
        unified_job_template: Windows-sumologic-production-aws-cac