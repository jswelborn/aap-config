---
controller_templates:
  - name: Terraform Cloud VM Post Apply
    organization: HTS SRE
    description: Post-provision orchestration workflow for Terraform-created virtual machines
    job_type: run
    inventory: Local
    project: aap-terraform-integration
    playbook: playbooks/terraform_cloud_post_apply.yaml
    credentials:
      - AAP Controller Credential
      - AWS EC2 Metadata Lookup
      - HCP Terraform API Token
    instance_groups:
      - azure-execution
      - aws-execution
    execution_environment: Default execution environment
    ask_variables_on_launch: true
    verbosity: 0
    timeout: 0
    job_slice_count: 1
    prevent_instance_group_fallback: false
    state: present