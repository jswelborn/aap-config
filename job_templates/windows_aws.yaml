---
controller_templates:
  - name: Windows-automox-production-aws-cac
    organization: Default
    description: AAP job template for Windows Automox agent deployment and lifecycle management in AWS
    job_type: run
    inventory: AWS-CaC-Test
    project: Windows-automox-cac
    playbook: windows_automox.yaml
    credentials:
      - automox-production 
      - hetwinadmin_updated 
    instance_groups:
      - aws-execution
    execution_environment: Default execution environment
    extra_vars:
      policy_group: production 
    prevent_instance_group_fallback: true
    job_slice_count: 1
    forks: 0
    verbosity: 0
    timeout: 0
    state: present

