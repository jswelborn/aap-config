---
controller_templates:
  - name: Windows-automox-production-aws
    organization: HTS SRE
    description: AAP job template for Windows Automox agent deployment and lifecycle management in AWS
    job_type: run
    inventory: AWS
    project: Windows-automox
    playbook: windows_automox.yaml
    credentials:
      - automox-production
      - "Windows Automation"
    instance_groups:
      - aws-execution
    execution_environment: EE Windows Kerberos
    ask_limit_on_launch: true
    ask_variables_on_launch: true
    extra_vars:
      policy_group: production
      ansible_host: !unsafe "{{ inventory_hostname }}.CompanyNet.org"
      ansible_winrm_transport: kerberos
      ansible_winrm_kinit_mode: manual
    prevent_instance_group_fallback: true
    job_slice_count: 1
    forks: 0
    verbosity: 0
    timeout: 0
    state: present

