---
controller_templates:
  - name: Linux-automox-production-azure
    organization: HTS SRE
    description: AAP job template for Linux Automox agent deployment and lifecycle management in Azure
    job_type: run
    inventory: Azure
    project: Linux-automox
    playbook: linux_automox.yaml
    credentials:
      - automox-production 
      - hetroot 
    instance_groups:
      - azure-execution
    execution_environment: Default execution environment
    extra_vars:
      policy_group: production 
    become_enabled: true
    prevent_instance_group_fallback: true
    job_slice_count: 1
    forks: 0
    verbosity: 0
    timeout: 0
    state: present

