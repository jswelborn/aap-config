---
controller_templates:
  - name: Linux-automox-production-aws-cac
    organization: Default
    description: AAP job template for Linux Automox agent deployment and lifecycle management in AWS
    job_type: run
    inventory: AWS-CaC-Test
    project: Linux-automox-cac
    playbook: linux_automox.yaml
    credentials:
      - automox-production 
      - hetroot 
    instance_groups:
      - aws-execution
    execution_environment: Default execution environment
    extra_vars:
      policy_group: production 
    become_enabled: true
    prevent_instance_group_fallback: true
    job_slice_count: 1
    forks: 0
    verbosity: 0
    timeout: 0
    state: present

